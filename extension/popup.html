<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PRISM Smart Autofill</title>
  <style>
    :root {
      --primary: #705831;
      --primary-hover: #5A4423;
      --bg: #F5F0E8;
      --surface: #FFFFFF;
      --text-main: #241A0B;
      --text-muted: #534335;
      --error: #BA1A1A;
      --success: #3D6A35;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      width: 320px;
      height: auto;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: var(--surface);
      padding: 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header img {
      width: 28px;
      height: 28px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }
    .content {
      padding: 20px;
      background: var(--surface);
      flex: 1;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: var(--primary);
    }
    button {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: var(--primary-hover);
    }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    .status.active {
      display: block;
    }
    .status.success {
      background: rgba(61, 106, 53, 0.1);
      color: var(--success);
      border: 1px solid rgba(61, 106, 53, 0.2);
    }
    .status.error {
      background: rgba(186, 26, 26, 0.1);
      color: var(--error);
      border: 1px solid rgba(186, 26, 26, 0.2);
    }
    .footer {
      padding: 12px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><path d="m12 14-8-4 8-4 8 4Z"/><path d="m12 14 8-4v6l-8 4-8-4Z"/></svg>
    <h1>PRISM Autofill</h1>
  </div>
  <div class="content">
    <div class="form-group">
      <label for="tokenInput">Autofill Consent Token</label>
      <input type="text" id="tokenInput" placeholder="Paste your generated token here">
    </div>
    <button id="saveBtn">Connect to PRISM</button>
    
    <div id="statusMsg" class="status"></div>
  </div>
  <div class="footer">
    Your identity data remains encrypted.
  </div>
  <script src="popup.js"></script>
</body>
</html>
